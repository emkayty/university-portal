{
  "name": "@university/api",
  "version": "1.0.0",
  "private": true,
  "scripts": {
    "start": "uvicorn core.asgi:app --host 0.0.0.0 --port 8000 --reload",
    "worker": "celery -A core worker -l info",
    "beat": "celery -A core beat -l info",
    "migrate": "python manage.py migrate",
    "makemigrations": "python manage.py makemigrations",
    "createsuperuser": "python manage.py createsuperuser",
    "test": "pytest",
    "lint": "flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics",
    "format": "black . --line-length 100",
    "collectstatic": "python manage.py collectstatic --noinput"
  },
  "dependencies": {
    "django": "^5.0.0",
    "django-ninja": "^1.0.0",
    "psycopg2-binary": "^2.9.9",
    "celery": "^5.3.0",
    "redis": "^5.0.0",
    "python-jose": "^3.3.0",
    "passlib": "^1.7.4",
    "python-multipart": "^0.0.6",
    "pydantic": "^2.5.0",
    "pydantic-settings": "^2.1.0",
    "django-cors-headers": "^4.3.0",
    "django-redis": "^5.4.0",
    "django-celery-beat": "^2.5.0",
    "phonenumbers": "^8.13.0",
    "Pillow": "^10.2.0",
    "reportlab": "^4.0.0",
    "weasyprint": "^60.0",
    " cryptography": "^41.0.0",
    "httpx": "^0.26.0",
    "python-dateutil": "^2.8.2",
    "boto3": "^1.34.0",
    "django-storages": "^1.14.0",
    "gunicorn": "^21.2.0",
    "uvicorn": "^0.27.0",
    "uvloop": "^0.19.0",
    "hiredis": "^2.3.0",
    "django-lifecycle": "^1.0.0",
    "django-filter": "^23.5.0",
    "pgsigner": "^1.0.0",
    "pgnet": "^1.0.0"
  },
  "devDependencies": {
    "pytest": "^7.4.0",
    "pytest-django": "^4.7.0",
    "pytest-cov": "^4.1.0",
    "pytest-asyncio": "^0.23.0",
    "black": "^23.12.0",
    "flake8": "^7.0.0",
    "isort": "^5.13.0",
    "mypy": "^1.8.0",
    "bandit": "^1.7.0",
    "safety": "^3.0.0",
    "faker": "^22.0.0",
    "factory-boy": "^3.3.0"
  },
  "requires-python": ">=3.11",
  "linters": {
    "black": {
      "line-length": 100,
      "target-version": ["py311"]
    },
    "isort": {
      "profile": "black",
      "line_length": 100
    }
  }
}
